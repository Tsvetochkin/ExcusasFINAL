# Configuración MySQL para rama productiva
# Para usar este perfil: ejecutar con --spring.profiles.active=prod
spring.datasource.url=jdbc:mysql://localhost:3306/excusas_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=tu_password_aqui

# Con MySQL no usamos H2 console
spring.h2.console.enabled=false

# Hibernate crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

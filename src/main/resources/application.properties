spring.application.name=ExcusasFINAL

# Настройки базы данных H2 (в памяти)
spring.datasource.url=jdbc:h2:mem:excusasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Включаем консоль H2 для браузера (localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Автоматическое создание таблиц на основе Entity-классов
spring.jpa.hibernate.ddl-auto=update
# Показывать SQL запросы в консоли (полезно для обучения)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
